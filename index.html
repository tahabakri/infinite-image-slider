<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Passing Frames — an infinite, draggable image slider</title>
<meta name="description" content="An infinite, draggable image slider where slides grow as they flow across the screen. Drag or scroll." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script>
  // Apply the saved / preferred theme before first paint to avoid a flash.
  // Kept inline on purpose — an external file would load too late and flash.
  (function () {
    var saved = localStorage.getItem('theme');
    var t =
      saved ||
      (window.matchMedia('(prefers-color-scheme: light)').matches
        ? 'light'
        : 'dark');
    document.documentElement.dataset.theme = t;
  })();
</script>
</head>
<body>
<main class="slider" aria-label="Image gallery. Drag or scroll to move.">
  <div class="scrim"></div>
  <div class="overlay">
    <div>
      <div class="top">
        <p class="eyebrow">Infinite gallery</p>
        <button class="theme-toggle" type="button" aria-label="Switch between light and dark mode">Light</button>
      </div>
      <h1 class="title">Passing Frames</h1>
    </div>
    <div class="foot">
      <span class="hint"><span class="dot"></span>Drag or scroll</span>
      <span>Endless loop</span>
    </div>
  </div>
</main>

<script src="slider.js"></script>
</body>
</html>
